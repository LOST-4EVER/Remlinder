name: Android CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_VERSION_CODE: ${{ github.run_number }}

jobs:
  version:
    name: Auto-version
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_name: ${{ steps.next_version.outputs.version_name }}
      version_code: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version
        id: next_version
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | head -1 || echo "v0.0")
          echo "Latest tag: $LATEST_TAG"
          LATEST_VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR _ <<< "$LATEST_VERSION"
          MINOR=${MINOR:-0}
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="v${MAJOR}.${NEW_MINOR}"
          echo "New version: $NEW_VERSION"
          echo "version_name=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "version_tag=$NEW_VERSION" >> "$GITHUB_OUTPUT"
      - name: Create tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.next_version.outputs.version_tag }}';
            const sha = '${{ github.sha }}';
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: sha
              });
              console.log(`Created tag ${tag} at ${sha}`);
            } catch (e) {
              console.log(`Tag creation skipped: ${e.message}`);
            }

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run lint
        run: ./gradlew lint --no-daemon --stacktrace

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          compression-level: 9

  build:
    name: Build APK (${{ matrix.build-type }})
    runs-on: ubuntu-latest
    needs: [lint, unit-test]

    strategy:
      matrix:
        build-type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Set version for tag push
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          echo "CI_VERSION_NAME=${TAG_VERSION#v}" >> "$GITHUB_ENV"
      - name: Build ${{ matrix.build-type }} APK
        run: ./gradlew assemble${{ matrix.build-type }} --no-daemon --stacktrace
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.build-type == 'Debug' && 'debug' || 'release' }}
          path: app/build/outputs/apk/${{ matrix.build-type == 'Debug' && 'debug' || 'release' }}/*.apk
          compression-level: 9
          retention-days: 30
          if-no-files-found: error

  release:
    name: Upload to GitHub Release
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: app-*
          path: apks
          merge-multiple: true

      - name: List downloaded APK files
        run: |
          echo "=== Downloaded APK files ==="
          ls -lh apks/ 2>/dev/null || echo "(empty)"

      - name: Set release metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "name=Release ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ contains(github.ref_name, '-') }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=nightly" >> "$GITHUB_OUTPUT"
            echo "name=Nightly Build" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          echo "commit_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "ref_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Create / Update Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          commit: ${{ steps.meta.outputs.commit_sha }}
          body: |
            ## App
            **Commit:** `${{ steps.meta.outputs.commit_sha }}`
            **Branch:** `${{ steps.meta.outputs.ref_name }}`

            ### Downloads
            | File | Description |
            |------|-------------|
            | `app-debug.apk` | Debug build |
            | `app-release.apk` | Release build |
          artifacts: apks/*
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: false
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
